<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenShare</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="uiContainer">
        <img src="logo.png" alt="Logo" class="logo">
        <div class="title" id="uiTitle"></div>
        <div class="message" id="uiMessage"></div>

        <div class="timer-container">
            <svg width="100" height="100">
                <circle class="timer-circle" cx="50" cy="50" r="45"></circle>
            </svg>
            <div class="timer-text" id="timer">0</div>
        </div>

        <div class="footer-text" id="uiFooter"></div>
        <button class="button" id="enterButton"></button>
        <div class="requester" id="uiRequester"></div>

        <audio id="notificationSound" src="audio.mp3" preload="auto"></audio>
        <audio id="alertSound" src="chitero.mp3" preload="auto"></audio>
    </div>

    <video id="endVideo" preload="none" playsinline>
        <source src="uwu.mp4" type="video/mp4">
    </video>

    <script src="script.js"></script>
</body>
</html>
